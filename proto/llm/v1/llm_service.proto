syntax = "proto3";
package llm.v1;

import "llm/v1/hello_world.proto";

import "google/protobuf/empty.proto";
import "google/api/annotations.proto";
import "google/api/http.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/afrizalsebastian/llm-integration-service/proto/gen/llm/api/v1";
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Integration Third Party LLM"
    version: "1.0"
  }
};

service LlmService {
  rpc HelloWorld(google.protobuf.Empty) returns (HelloWorldResponse){
    option(google.api.http) = {
      get: "/hello-world"
    };

    option(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Hello world, dummy endpoint"
    };
  };
}